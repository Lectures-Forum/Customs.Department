<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك أسئلة الرقابة والمراجعة الداخلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Merienda:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <img src="1.jpg" class="watermark" alt="شعار مصطفى يوسف">

        <div id="login-screen">
            <div style="font-size: 60px; margin-bottom: 10px;">🎓</div>
            <h1>اختبار الرقابة والمراجعة الداخلية</h1>
            <p class="welcome-text">اللَّهُــمَّ صـَلِّ وَسَـــلِّمْ وبارك علـى سيدنا مُحمَّد وآله ﷺ ❤️</p>
            <p class="welcome-text">هذه الاسئلة مقدمة من دكتورنا الفاضل محمد الركايبي</p>
            <input type="text" id="studentName" placeholder="أدخل اسمك الثلاثي أو الرباعي للبدء..." autocomplete="off">
            <br>
            <button class="primary" onclick="_0xstart()">ابدأ الاختبار الآن</button>
        </div>

        <div id="quiz-screen" style="display: none;">
            <div class="progress-container" style="display: block;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="timer-info" style="margin-bottom: 0;">السؤال <span id="currentNum">1</span> من <span id="totalNum"></span></div>
                <button class="q-map-toggle" onclick="toggleMap()">📍 خريطة الأسئلة</button>
            </div>
            <div id="q-map-container"></div>

            <div id="questions-container"></div>
            
            <div class="nav-buttons">
                <button class="secondary" id="prevBtn" onclick="_0xprev()" style="visibility: hidden;">السابق</button>
                <button class="primary" id="nextBtn" onclick="_0xnext()">التالي</button>
            </div>
        </div>

        <div id="result-screen" style="display: none;">
            <div id="resIcon" class="result-icon"></div>
            <h1 id="resHeader"></h1>
            <div id="scoreDisplay" class="score-display"></div>
            <div id="timeSummary" class="time-summary"></div>
            <p id="statusMsg" style="font-weight: 600; color: var(--primary-color); display: none;"></p>

            <div class="result-actions">
                <button class="secondary" onclick="location.reload()">إعادة الاختبار 🔄</button>
                <button class="primary" onclick="_0xrev()">مراجعة الإجابات 📝</button>
            </div>
        </div>
    </div>

    <script src="App.js"></script>
</body>
</html>
